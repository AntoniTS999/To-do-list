{% extends  "base.html" %}

{% block content %}
	<h6>Are you sure you want to delete a tag: {{ tag }}?</h6>
  <p><i>it would be deleted permanently</i></p>
  <form action="" method="post">
  {% csrf_token %}
    <input class="btn btn-danger" type="submit" value="Yes, delete">
  {% url 'todo:tag-list' as tag_list %}
    <a class="btn btn-warning" href="{{ next|default:tag_list }}">Cancel</a>
  </form>
{% endblock %}

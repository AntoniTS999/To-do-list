{% extends  "base.html" %}

{% block content %}
	<h1>Tags
    <a style="float: right" class="btn btn-primary" href="{% url 'todo:tag-create' %}">Add</a>
  </h1>
  <table class="table">
  <thead>
  <tr>
    <th>Name</th>
    <th>Update</th>
    <th>Delete</th>
  </tr>
  </thead>
  <tbody>
  <tr>
    {% for tag in tag_list %}
    <td>{{ tag.name }}</td>
    <td><a class="btn btn-secondary" href="{% url 'todo:tag-update' pk=tag.id %}">Update</a></td>
    <td><a class="btn btn-secondary" href="#">Delete</a></td>
      </tr>
    {% endfor %}

  </table>
{% endblock %}
